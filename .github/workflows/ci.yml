name: X265 CI - TSAN

run-name: ${{ github.event.pull_request.title || github.event.head_commit.message || 'Manual run' }}

on:
  push:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  DEBIAN_FRONTEND: noninteractive

defaults:
  run:
    shell: bash

jobs:
  build-tsan:
    name: "Build TSAN"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-tsan-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-tsan-${{ runner.os }}-

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /home/runner/apt-archives
          key: apt-build-tsan-${{ runner.os }}-v1
          restore-keys: apt-build-tsan-${{ runner.os }}-v1
      - name: Pre-populate apt cache
        run: sudo cp /home/runner/apt-archives/*.deb /var/cache/apt/archives/ 2>/dev/null || true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake nasm ccache libnuma-dev clang
          clang --version

      - name: Prepare apt cache
        if: always()
        run: |
          mkdir -p /home/runner/apt-archives
          cp -n /var/cache/apt/archives/*.deb /home/runner/apt-archives/ 2>/dev/null || true

      - name: Build (TSAN instrumented)
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          mkdir -p build/tsan && cd build/tsan
          cmake ../../source \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_FLAGS="-fsanitize=thread -g -O1" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1" \
            -DENABLE_SHARED=OFF
          make -j$(nproc)
          test -f x265 && echo "TSAN CLI binary OK"
          ./x265 --version

      - name: Verify TSAN instrumentation
        run: |
          if nm build/tsan/x265 2>/dev/null | grep -q '__tsan_init' \
             || strings build/tsan/x265 | grep -q 'ThreadSanitizer'; then
            echo "[OK] Binary is TSAN-instrumented"
          else
            echo "::error::x265 binary is NOT TSAN-instrumented!"
            exit 1
          fi

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: x265-tsan
          path: build/tsan/x265
          retention-days: 3

  # Trusted job: the ONLY place R2 credentials are referenced. Never checks
  # out or executes PR code, so a malicious PR cannot reach these secrets —
  # the job boundary (fresh VM per job) is the real isolation in Actions.
  # Pulls the bundle fresh from R2 every run; the artifact is just the
  # courier to test-tsan, not a cache. Token is READ-ONLY, bucket-scoped.
  prepare-tsan-assets:
    name: "Prepare TSAN Test Assets"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download TSAN video bundle from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp s3://x265-assets/tsan/tsan-videos.tar.gz . --endpoint-url "$R2_ENDPOINT"
          echo "[OK] bundle fetched: $(du -h tsan-videos.tar.gz)"

      - name: Upload video bundle
        uses: actions/upload-artifact@v7
        with:
          name: tsan-videos-${{ github.run_id }}
          path: tsan-videos.tar.gz
          retention-days: 1
          compression-level: 0   # already gzipped — skip recompressing
          overwrite: true

  test-tsan:
    name: "Test TSAN - Threading Race Detection"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: [build-tsan, prepare-tsan-assets]
    steps:
      - name: Download TSAN binary
        uses: actions/download-artifact@v8
        with:
          name: x265-tsan
          path: dist

      # Videos arrive from the trusted prepare-tsan-assets job. This job
      # references NO secrets anywhere, because it executes the PR-built
      # binary — nothing here for a malicious PR to steal.
      - name: Download TSAN video bundle
        uses: actions/download-artifact@v8
        with:
          name: tsan-videos-${{ github.run_id }}

      - name: Extract videos
        run: |
          mkdir -p tsan-videos
          tar -xzf tsan-videos.tar.gz -C tsan-videos/
          rm tsan-videos.tar.gz
          ls -la tsan-videos/

      - name: Run TSAN regression tests
        run: |
          chmod +x dist/x265
          X265=$(pwd)/dist/x265
          VID=$(pwd)/tsan-videos
          mkdir -p tsan-logs
          export TSAN_OPTIONS="halt_on_error=0:history_size=7"
          echo "TSAN_OPTIONS=$TSAN_OPTIONS"
          FAIL=0
          > /tmp/tsan_results.log
          run_tsan() {
            local label="$1"; shift
            local slug
            slug=$(echo "$label" | tr ' /' '__')
            local logfile="tsan-logs/${slug}.log"
            echo ""
            echo "=== $label — log: $logfile ==="
            local start_ts=$SECONDS
            "$@" 2>&1 | tee "$logfile" || true
            local rc=${PIPESTATUS[0]:-0}
            echo "[debug] exit code: $rc | duration: $((SECONDS - start_ts))s"
            local n
            n=$(grep -c "WARNING: ThreadSanitizer" "$logfile" || true)
            n=${n:-0}
            if [ "$n" -gt 0 ]; then
              echo "[TSAN] !! RESULT $label: RACE DETECTED ($n warnings)"
              grep "SUMMARY: ThreadSanitizer" "$logfile" | sort | uniq -c | sort -rn || true
              echo "| \`$label\` | RACE DETECTED ($n warnings) |" >> /tmp/tsan_results.log
              FAIL=$((FAIL+1))
            else
              echo "[TSAN] RESULT $label: clean"
              echo "| \`$label\` | Clean |" >> /tmp/tsan_results.log
            fi
          }
          run_tsan "ultrafast RaceHorses_10bit" \
            $X265 --preset ultrafast --tune psnr --limit-refs 1 --no-info --hash=1 --psnr --ssim \
                  --input-res=416x240 --input-depth=10 --input-csp=i420 --fps=30 --csv /tmp/out1.csv \
                  -o /tmp/out1.hevc "$VID/RaceHorses_416x240_30_10bit.yuv"
          run_tsan "superfast mobile_calendar" \
            $X265 --preset superfast --weightp --no-info --hash=1 --psnr --ssim --log-level=full --csv /tmp/out2.csv \
                  -o /tmp/out2.hevc "$VID/mobile_calendar_422_ntsc.y4m"
          run_tsan "medium silent_cif" \
            $X265 --preset medium --me full --rect --amp --no-info --hash=1 --psnr --ssim --csv /tmp/out3.csv \
                  -o /tmp/out3.hevc "$VID/silent_cif_420.y4m"
          run_tsan "slow BasketballDrive" \
            $X265 --preset slow --nr-intra 100 -F4 --aq-strength 3 --qg-size 16 --limit-refs 1 \
                  --no-info --hash=1 --psnr --ssim --csv /tmp/out4.csv \
                  -o /tmp/out4.hevc "$VID/BasketballDrive_1920x1080_50.y4m"
          run_tsan "veryslow RaceHorses" \
            $X265 --preset veryslow --tskip-fast --tskip --limit-refs 3 --limit-tu 3 \
                  --no-info --hash=1 --psnr --ssim --csv /tmp/out5.csv \
                  -o /tmp/out5.hevc "$VID/RaceHorses_416x240_30.y4m"
          rm -f /tmp/out*.hevc /tmp/out*.csv
          echo ""
          echo "=== Captured console logs ==="
          ls -la tsan-logs/ || true
          echo ""
          echo "=== TSAN Results FAIL=$FAIL ==="
          mkdir -p summaries && cp /tmp/tsan_results.log summaries/tsan.log 2>/dev/null || true
          test $FAIL -eq 0

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## TSAN — Threading Race Detection"
            echo ""
            echo "> Runner: $(nproc) cores · AVX-512: $(grep -qm1 avx512f /proc/cpuinfo && echo yes || echo no)"
            echo ""
            echo "| Test | Result |"
            echo "|------|:------:|"
            if [ -f /tmp/tsan_results.log ] && [ -s /tmp/tsan_results.log ]; then
              cat /tmp/tsan_results.log
            else
              echo "| _no data_ | - |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload console logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tsan-console-logs
          path: tsan-logs/*.log
          if-no-files-found: ignore
          retention-days: 7
